searches:
- name: Beginner Turntable
  urls:
  - https://www.ricardo.ch/de/s/plattenspieler/
  - https://www.ricardo.ch/de/c/hifi-geraete-38498/plattenspieler/
  - https://www.ricardo.ch/de/c/hifi-raritaeten-38555/plattenspieler/
  context: I’m looking for a beginner-friendly used turntable in Switzerland, ideally
    near 8050 Zürich Oerlikon for easier pickup. My budget is about CHF 100–200. I
    want an automatic or semi-automatic model where the tonearm returns on its own;
    fully manual turntables are a dealbreaker. I’m open to both belt-drive and direct-drive
    if the deck is reliable and sounds good out of the box. Preferred brands are Thorens,
    Technics, Dual, Pioneer, and Pro-Ject. Positive factors include a known good cartridge
    already installed, especially Shure, Audio-Technica VM95 series, or Ortofon; confirmation
    that the unit has been tested and is fully working; clear photos showing a clean
    tonearm and stylus; and a recently replaced belt if it is a belt-drive model.
    Nice extras are a built-in phono preamp and a dust cover. Red flags include listings
    marked defekt/defective, missing or unknown stylus, no tonearm photos, a very
    cheap no-name cartridge, visible heavy wear or rust around the motor area, and
    fully manual-only operation. I want the analyzer to strongly favor reliable, easy-to-use
    turntables that need minimal extra work or spending to get started.
  max_price: 200.0
  min_deal_score: 8
