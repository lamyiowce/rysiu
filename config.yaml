# Ricardo Deal Analyzer — Configuration
# Copy this file to config.yaml and customize your searches.

searches:
  - name: "MacBook Air M2"
    # Direct Ricardo search URL — paste any search URL from the website
    url: "https://www.ricardo.ch/de/s/macbook-air-m2/"
    # Natural language context for Claude — be specific about what makes a good deal
    context: |
      I'm looking for a MacBook Air M2 (2022) in good or excellent condition.
      Target specs: 8GB RAM minimum, 256GB or 512GB SSD, any color.
      I'm willing to pay CHF 700–1050. A great deal would be anything under CHF 850
      in excellent condition. Defective, broken, or "for parts" listings are not interesting.
      I do not want devices with a cracked screen or missing charger.
    max_price: 1050       # Pre-filter: skip listings above this price (CHF)
    min_deal_score: 7     # Only alert for scores 7 or above (out of 10)

  - name: "iPhone 15 Pro"
    url: "https://www.ricardo.ch/de/s/iphone-15-pro/"
    context: |
      Looking for an iPhone 15 Pro (not Pro Max) in good condition or better,
      any storage size from 128GB up. Budget is CHF 600–900.
      Must be unlocked (SIM-free) or locked to Swisscom/Salt/Sunrise — no foreign locks.
      Not interested in cracked screens, water damage, or battery below 85%.
    max_price: 900
    min_deal_score: 7

notifications:
  telegram:
    enabled: true
    # Bot token and chat_id are read from environment variables (see .env)

monitoring:
  interval_minutes: 30        # How often to check for new listings
  max_listings_per_search: 30 # Max listings to fetch per search URL per run
  request_delay_seconds: 2    # Polite delay between HTTP requests

openai:
  model: "gpt-5.4"
