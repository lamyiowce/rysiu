name: Ricardo Monitor

on:
  schedule:
    - cron: '0 8 * * *'  # every day at 08:00 UTC
  workflow_dispatch:       # allow manual runs from the Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Restore seen.json from the most recent cache (no git commits needed).
      # key changes every run so a fresh entry is always saved;
      # restore-keys picks up whatever was saved last time.
      - name: Restore seen-listings cache
        uses: actions/cache@v4
        with:
          path: data/seen.json
          key: seen-listings-${{ github.run_id }}
          restore-keys: seen-listings-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run monitor
        run: python main.py --once
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
