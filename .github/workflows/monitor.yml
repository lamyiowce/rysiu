name: Ricardo Monitor

on:
  schedule:
    - cron: '0 8 * * *'  # every day at 08:00 UTC
  workflow_dispatch:          # also allow manual runs from the Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit the state file back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run monitor
        run: python main.py --once
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Persist state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen.json
          git diff --staged --quiet || git commit -m "chore: update seen listings [skip ci]"
          git push
